<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - Student Results Portal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-graduation-cap"></i> Student Login</h1>
        
        {% if error %}
        <div class="error">
            <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}
        
        <div class="card" style="max-width: 500px; margin: 0 auto;">
            <form method="POST" action="{{ url_for('student_login') }}" class="login-form">
                <div class="form-group">
                    <label for="roll_number">
                        <i class="fas fa-id-card"></i> Roll Number:
                    </label>
                    <input 
                        type="text" 
                        id="roll_number" 
                        name="roll_number" 
                        placeholder="Enter your roll number"
                        value="{{ request.form.roll_number if request.form.roll_number else '' }}"
                        required
                    >
                </div>
                
                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i> Password:
                    </label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Enter your password"
                        required
                    >
                </div>
                
                <button type="submit" class="btn student-btn">
                    <i class="fas fa-search"></i> View Result
                </button>
            </form>
        </div>
        
        <p style="margin-top: 20px; text-align: center;">
            <a href="{{ url_for('index') }}">
                <i class="fas fa-arrow-left"></i> Back to Home
            </a>
        </p>
    </div>
</body>
</html>

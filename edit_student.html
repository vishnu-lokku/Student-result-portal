<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student - Admin Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .edit-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .edit-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
        }
        
        .edit-form {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 10px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .marks-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #4a5568;
            font-weight: 600;
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #4299e1;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.1);
        }
        
        .form-group input[readonly] {
            background-color: #edf2f7;
            cursor: not-allowed;
        }
        
        .section-title {
            color: #2d3748;
            margin: 25px 0 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #4299e1;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            justify-content: flex-end;
        }
        
        .save-btn {
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(72, 187, 120, 0.3);
        }
        
        .cancel-btn {
            background: #a0aec0;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .cancel-btn:hover {
            background: #718096;
        }
        
        .info-box {
            background: #ebf8ff;
            border-left: 4px solid #4299e1;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 768px) {
            .form-row, .marks-row {
                grid-template-columns: 1fr;
            }
            
            .button-group {
                flex-direction: column;
            }
            
            .save-btn, .cancel-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="edit-container">
            <div class="edit-header">
                <h1><i class="fas fa-edit"></i> Edit Student</h1>
                <a href="{{ url_for('admin_dashboard') }}" class="btn admin-btn">
                    <i class="fas fa-arrow-left"></i> Back to Dashboard
                </a>
            </div>
            
            <div class="info-box">
                <i class="fas fa-info-circle"></i>
                <strong>Editing:</strong> {{ student.name }} (Roll: {{ student.roll_number }})
            </div>
            
            <form method="POST" class="edit-form">
                <!-- Student Details Section -->
                <h3 class="section-title"><i class="fas fa-user-graduate"></i> Student Details</h3>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="roll_number">Roll Number:</label>
                        <input type="text" id="roll_number" value="{{ student.roll_number }}" readonly>
                        <small style="color: #718096;">Roll number cannot be changed</small>
                    </div>
                    
                    <div class="form-group">
                        <label for="name">Student Name:</label>
                        <input type="text" id="name" name="name" value="{{ student.name }}" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="class">Class:</label>
                        <input type="text" id="class" name="class" value="{{ student.class }}" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password:</label>
                        <input type="text" id="password" name="password" value="{{ student.password }}" required>
                    </div>
                </div>
                
                <!-- Marks Section -->
                <h3 class="section-title"><i class="fas fa-chart-line"></i> Enter Marks (out of 100)</h3>
                
                <div class="marks-row">
                    <div class="form-group">
                        <label for="math">Mathematics:</label>
                        <input type="number" id="math" name="math" min="0" max="100" 
                               value="{{ marks['Math'] }}" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="science">Science:</label>
                        <input type="number" id="science" name="science" min="0" max="100" 
                               value="{{ marks['Science'] }}" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="english">English:</label>
                        <input type="number" id="english" name="english" min="0" max="100" 
                               value="{{ marks['English'] }}" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="hindi">Hindi:</label>
                        <input type="number" id="hindi" name="hindi" min="0" max="100" 
                               value="{{ marks['Hindi'] }}" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="computer">Computer:</label>
                        <input type="number" id="computer" name="computer" min="0" max="100" 
                               value="{{ marks['Computer'] }}" required>
                    </div>
                </div>
                
                <!-- Action Buttons -->
    <div class="button-group">
        <button type="button" onclick="handleCancel()" class="cancel-btn">
            <i class="fas fa-times"></i> Cancel
        </button>
        <button type="submit" class="save-btn">
            <i class="fas fa-save"></i> Save Changes
        </button>
    </div>
    
    <script>
        // Track form changes
        let formChanged = false;
        let formSubmitted = false;
        
        // Watch all inputs for changes
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('change', () => {
                formChanged = true;
                console.log('Form changed'); // For debugging
            });
            
            // Also track typing
            input.addEventListener('input', () => {
                formChanged = true;
            });
        });
        
        // Mark form as submitted when saving
        document.querySelector('form').addEventListener('submit', function(e) {
            formSubmitted = true;
            formChanged = false;
            console.log('Form submitted'); // For debugging
            // Let the form submit normally
            return true;
        });
        
        // Handle cancel button
        function handleCancel() {
            if (formChanged && !formSubmitted) {
                if (confirm('You have unsaved changes. Are you sure you want to cancel?')) {
                    window.location.href = '{{ url_for('admin_dashboard') }}';
                }
            } else {
                window.location.href = '{{ url_for('admin_dashboard') }}';
            }
        }
        
        // Before unload warning
        window.addEventListener('beforeunload', function(e) {
            if (formChanged && !formSubmitted) {
                e.preventDefault();
                e.returnValue = 'You have unsaved changes. Are you sure you want to leave?';
                return e.returnValue;
            }
        });
        
        // Optional: Remove warning after successful save
        window.addEventListener('unload', function() {
            // Clean up
            formChanged = false;
            formSubmitted = false;
        });
    </script>
</body>
</html>
